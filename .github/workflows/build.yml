name: Release build

on:
  pull_request:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  packages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install build twine pytest pyyaml
      - run: test -z "$(git status --porcelain)"
      - run: python -m build
      - run: python -m twine check dist/*.whl dist/*.tar.gz
      - run: python -m pytest tests/test_distribution.py -q
      - uses: actions/upload-artifact@v4
        with:
          name: python-distributions
          path: dist/*
          if-no-files-found: error

  package-smoke:
    needs: packages
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
        artifact: [wheel, sdist]
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: actions/download-artifact@v4
        with:
          name: python-distributions
          path: dist
      - name: Clean install and CLI smoke
        shell: bash
        run: |
          python -m venv /tmp/release-venv
          if [ "${{ matrix.artifact }}" = wheel ]; then package=(dist/*.whl); else package=(dist/*.tar.gz); fi
          /tmp/release-venv/bin/python -m pip install "${package[0]}"
          /tmp/release-venv/bin/novel-crawler --help
          /tmp/release-venv/bin/novel-crawler env

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build --pull -t novel-crawler:ci .
      - name: Smoke test CLI and non-root identity
        run: |
          output="$(docker run --rm novel-crawler:ci env)"
          echo "$output"
          grep -F "Runtime:" <<< "$output"
          test "$(docker run --rm --entrypoint id novel-crawler:ci -u)" != "0"
      - name: Launch matching Chromium in the image
        run: |
          docker run --rm --entrypoint python novel-crawler:ci -c "from playwright.sync_api import sync_playwright; p=sync_playwright().start(); b=p.chromium.launch(headless=True); print(b.version); b.close(); p.stop()"
