name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.11', '3.12', '3.13']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install project
      run: |
        python -m pip install --upgrade pip
        python -m pip install -e ".[dev]"

    - name: Compile check
      run: python -m compileall -q novel_crawler main.py

    - name: Run tests
      run: python -m pytest -q

  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -e ".[dev]"
      - run: python -m ruff check novel_crawler tests main.py
      - run: python -m mypy novel_crawler
      - run: python -m pytest --cov=novel_crawler.cli --cov=novel_crawler.runtime --cov-report=term-missing --cov-fail-under=80 -q
